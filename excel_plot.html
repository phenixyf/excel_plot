<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Excel 数据曲线图</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --line: #d7dce3;
      --soft-line: #edf0f4;
      --accent: #246bfe;
      --accent-soft: #eaf1ff;
      --green: #15803d;
      --danger: #b42318;
      --shadow: 0 12px 30px rgba(31, 41, 51, 0.08);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-columns: minmax(320px, 410px) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
    }

    .input-panel,
    .plot-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .input-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: calc(100vh - 32px);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 650;
    }

    .series-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input[type="number"],
    input[type="text"] {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input[type="number"] {
      width: 58px;
      padding: 6px 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 7px 9px;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(36, 107, 254, 0.14);
    }

    .field-list {
      padding: 14px 16px 4px;
      overflow: auto;
    }

    .field {
      margin-bottom: 14px;
    }

    .field-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
    }

    label {
      color: var(--text);
      font-size: 13px;
      font-weight: 650;
    }

    .field-tools {
      display: grid;
      grid-template-columns: minmax(72px, 1fr) 34px;
      gap: 8px;
      width: min(190px, 58%);
    }

    textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      outline: none;
      line-height: 1.45;
      tab-size: 4;
    }

    .x-data textarea {
      min-height: 112px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--line);
    }

    .actions .wide {
      grid-column: 1 / -1;
    }

    button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    button:hover {
      border-color: #aeb8c6;
      background: #f9fafb;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 650;
    }

    button.primary:hover {
      background: #1758d6;
    }

    button.mode.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #174ea6;
      font-weight: 650;
    }

    button.icon {
      width: 34px;
      padding: 0;
      font-size: 17px;
      line-height: 1;
    }

    .plot-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: calc(100vh - 32px);
      overflow: hidden;
    }

    .plot-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .tool-group button {
      min-width: 64px;
      padding: 0 12px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      text-align: right;
    }

    .canvas-wrap {
      position: relative;
      min-height: 420px;
      background:
        linear-gradient(90deg, rgba(237, 240, 244, 0.85) 1px, transparent 1px),
        linear-gradient(rgba(237, 240, 244, 0.85) 1px, transparent 1px),
        #ffffff;
      background-size: 48px 48px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    canvas.pan-mode {
      cursor: grab;
    }

    canvas.pan-mode.dragging {
      cursor: grabbing;
    }

    .tooltip {
      position: absolute;
      display: none;
      max-width: 260px;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
      box-shadow: 0 8px 20px rgba(31, 41, 51, 0.12);
      pointer-events: none;
      z-index: 3;
    }

    .plot-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 38px;
      padding: 8px 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .message {
      color: var(--muted);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .message.error {
      color: var(--danger);
    }

    .message.ok {
      color: var(--green);
    }

    .swatches {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(31, 41, 51, 0.18);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .input-panel,
      .plot-panel {
        max-height: none;
        min-height: auto;
      }

      .plot-panel {
        min-height: 520px;
      }

      .canvas-wrap {
        min-height: 420px;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      .panel-header,
      .plot-toolbar,
      .plot-footer {
        align-items: stretch;
        flex-direction: column;
      }

      .status {
        text-align: left;
        width: 100%;
      }

      .tool-group {
        width: 100%;
      }

      .tool-group button {
        flex: 1;
      }

      .field-tools {
        grid-template-columns: minmax(64px, 1fr) 34px;
        width: min(170px, 62%);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="input-panel" aria-label="数据输入">
      <div class="panel-header">
        <h1>Excel 数据曲线图</h1>
        <div class="series-control">
          <label for="seriesCount">Y 曲线数</label>
          <input id="seriesCount" type="number" min="1" max="12" value="2" />
        </div>
      </div>

      <div class="field-list">
        <div class="field x-data">
          <div class="field-top">
            <label for="xInput">X 数据</label>
          </div>
          <textarea id="xInput" spellcheck="false"></textarea>
        </div>

        <div id="yFields"></div>
      </div>

      <div class="actions">
        <button id="plotBtn" class="primary wide">绘图</button>
        <button id="sampleBtn">示例</button>
        <button id="clearBtn">清空</button>
      </div>
    </section>

    <section class="plot-panel" aria-label="曲线图">
      <div class="plot-toolbar">
        <div class="tool-group">
          <button id="panBtn" class="mode active" type="button">平移</button>
          <button id="zoomBoxBtn" class="mode" type="button">框选</button>
          <button id="resetBtn" type="button">还原</button>
        </div>
        <div id="status" class="status">等待数据</div>
      </div>

      <div id="canvasWrap" class="canvas-wrap">
        <canvas id="plotCanvas" class="pan-mode"></canvas>
        <div id="tooltip" class="tooltip"></div>
      </div>

      <div class="plot-footer">
        <div id="message" class="message">X 为空时使用数据序号</div>
        <div id="swatches" class="swatches"></div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const colors = [
        "#246bfe", "#e11d48", "#15803d", "#b45309", "#7c3aed", "#0891b2",
        "#be123c", "#4d7c0f", "#c026d3", "#0f766e", "#ca8a04", "#475569"
      ];

      const els = {
        seriesCount: document.getElementById("seriesCount"),
        yFields: document.getElementById("yFields"),
        xInput: document.getElementById("xInput"),
        plotBtn: document.getElementById("plotBtn"),
        sampleBtn: document.getElementById("sampleBtn"),
        clearBtn: document.getElementById("clearBtn"),
        panBtn: document.getElementById("panBtn"),
        zoomBoxBtn: document.getElementById("zoomBoxBtn"),
        resetBtn: document.getElementById("resetBtn"),
        canvas: document.getElementById("plotCanvas"),
        canvasWrap: document.getElementById("canvasWrap"),
        tooltip: document.getElementById("tooltip"),
        status: document.getElementById("status"),
        message: document.getElementById("message"),
        swatches: document.getElementById("swatches")
      };

      const ctx = els.canvas.getContext("2d");
      const state = {
        traces: [],
        bounds: null,
        view: null,
        mode: "pan",
        dragging: false,
        dragStart: null,
        startView: null,
        selection: null,
        hover: null,
        xKind: "number",
        dpr: 1,
        rect: { left: 70, right: 22, top: 24, bottom: 52, width: 0, height: 0 }
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function niceNumber(value) {
        if (!Number.isFinite(value) || value === 0) return 1;
        const exp = Math.floor(Math.log10(Math.abs(value)));
        const f = Math.abs(value) / Math.pow(10, exp);
        let nf = 1;
        if (f < 1.5) nf = 1;
        else if (f < 3) nf = 2;
        else if (f < 7) nf = 5;
        else nf = 10;
        return Math.sign(value) * nf * Math.pow(10, exp);
      }

      function splitExcelText(text, kind) {
        const clean = text.replace(/\u00a0/g, " ").trim();
        if (!clean) return [];
        const out = [];
        clean.split(/\r?\n/).forEach((line) => {
          const row = line.trim();
          if (!row) return;
          let cells;
          if (row.includes("\t")) {
            cells = row.split("\t");
          } else if (kind === "x" && parseDateValue(row) !== null && !Number.isFinite(parseNumericValue(row))) {
            cells = [row];
          } else if (/[,，;]/.test(row) && !isThousandsNumber(row)) {
            cells = row.split(/[,，;]/);
          } else {
            cells = row.split(/\s+/);
          }
          cells.forEach((cell) => {
            const value = cell.trim();
            if (value) out.push(value);
          });
        });
        return out;
      }

      function isThousandsNumber(text) {
        return /^[-+]?\d{1,3}(,\d{3})+(\.\d+)?%?$/.test(text.trim());
      }

      function parseNumericValue(token) {
        const t = token.trim().replace(/,/g, "");
        if (!t) return NaN;
        if (/%$/.test(t)) {
          const n = Number(t.slice(0, -1));
          return Number.isFinite(n) ? n / 100 : NaN;
        }
        const n = Number(t);
        return Number.isFinite(n) ? n : NaN;
      }

      function parseDateValue(token) {
        const t = token.trim();
        if (!/[/:年月日-]/.test(t)) return null;
        const normalized = t
          .replace(/年/g, "/")
          .replace(/月/g, "/")
          .replace(/日/g, "")
          .replace(/\./g, "/");
        const ms = Date.parse(normalized);
        return Number.isFinite(ms) ? ms : null;
      }

      function parseY(text) {
        return splitExcelText(text, "y")
          .map(parseNumericValue)
          .filter(Number.isFinite);
      }

      function parseX(text) {
        const tokens = splitExcelText(text, "x");
        const values = [];
        let dateCount = 0;
        tokens.forEach((token) => {
          const n = parseNumericValue(token);
          if (Number.isFinite(n)) {
            values.push(n);
            return;
          }
          const ms = parseDateValue(token);
          if (ms !== null) {
            values.push(ms);
            dateCount += 1;
          }
        });
        return { values, kind: dateCount > 0 && dateCount === values.length ? "date" : "number" };
      }

      function formatNumber(value) {
        if (!Number.isFinite(value)) return "";
        const abs = Math.abs(value);
        if (abs >= 10000 || (abs > 0 && abs < 0.001)) return value.toExponential(2);
        if (abs >= 100) return value.toFixed(0);
        if (abs >= 10) return value.toFixed(1).replace(/\.0$/, "");
        return value.toFixed(3).replace(/0+$/, "").replace(/\.$/, "");
      }

      function formatDate(ms) {
        const d = new Date(ms);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        const range = state.view ? state.view.xmax - state.view.xmin : 0;
        if (range <= 1000 * 60 * 60 * 24 * 2) return `${m}-${day} ${h}:${min}`;
        if (range <= 1000 * 60 * 60 * 24 * 370) return `${m}-${day}`;
        return `${y}-${m}`;
      }

      function formatX(value) {
        return state.xKind === "date" ? formatDate(value) : formatNumber(value);
      }

      function createYField(index, name = `Y${index + 1}`) {
        const field = document.createElement("div");
        field.className = "field";
        field.dataset.index = String(index);
        field.innerHTML = `
          <div class="field-top">
            <label for="yInput${index}">Y${index + 1} 数据</label>
            <div class="field-tools">
              <input id="yName${index}" type="text" value="${name}" aria-label="曲线名称 ${index + 1}">
              <button class="icon paste-clear" type="button" title="清除此 Y 数据" aria-label="清除 Y${index + 1}">×</button>
            </div>
          </div>
          <textarea id="yInput${index}" spellcheck="false"></textarea>
        `;
        field.querySelector(".paste-clear").addEventListener("click", () => {
          field.querySelector("textarea").value = "";
        });
        return field;
      }

      function syncYFields() {
        const count = clamp(Number(els.seriesCount.value) || 1, 1, 12);
        els.seriesCount.value = count;
        const existing = Array.from(els.yFields.querySelectorAll(".field"));
        const data = existing.map((field, index) => ({
          name: field.querySelector(`#yName${index}`)?.value || `Y${index + 1}`,
          text: field.querySelector(`#yInput${index}`)?.value || ""
        }));

        els.yFields.innerHTML = "";
        for (let i = 0; i < count; i += 1) {
          const field = createYField(i, data[i]?.name || `Y${i + 1}`);
          field.querySelector("textarea").value = data[i]?.text || "";
          els.yFields.appendChild(field);
        }
        renderSwatches();
      }

      function collectData() {
        const parsedX = parseX(els.xInput.value);
        const traces = [];
        const yAreas = Array.from(els.yFields.querySelectorAll(".field"));

        yAreas.forEach((field, index) => {
          const y = parseY(field.querySelector("textarea").value);
          if (!y.length) return;
          const name = field.querySelector("input[type='text']").value.trim() || `Y${index + 1}`;
          const hasX = parsedX.values.length > 0;
          const len = hasX ? Math.min(parsedX.values.length, y.length) : y.length;
          if (len < 2) return;
          const x = hasX ? parsedX.values.slice(0, len) : Array.from({ length: len }, (_, i) => i + 1);
          traces.push({
            name,
            color: colors[index % colors.length],
            x,
            y: y.slice(0, len)
          });
        });

        if (!traces.length) {
          throw new Error("至少需要一组包含两个以上数值的 Y 数据");
        }

        state.xKind = parsedX.values.length > 0 ? parsedX.kind : "number";
        return traces;
      }

      function computeBounds(traces) {
        let xmin = Infinity;
        let xmax = -Infinity;
        let ymin = Infinity;
        let ymax = -Infinity;
        traces.forEach((trace) => {
          trace.x.forEach((x) => {
            xmin = Math.min(xmin, x);
            xmax = Math.max(xmax, x);
          });
          trace.y.forEach((y) => {
            ymin = Math.min(ymin, y);
            ymax = Math.max(ymax, y);
          });
        });

        if (xmin === xmax) {
          xmin -= 1;
          xmax += 1;
        }
        if (ymin === ymax) {
          ymin -= 1;
          ymax += 1;
        }

        const xPad = (xmax - xmin) * 0.04;
        const yPad = (ymax - ymin) * 0.08;
        return {
          xmin: xmin - xPad,
          xmax: xmax + xPad,
          ymin: ymin - yPad,
          ymax: ymax + yPad
        };
      }

      function setMessage(text, type = "") {
        els.message.textContent = text;
        els.message.className = `message ${type}`.trim();
      }

      function plotFromInputs() {
        try {
          state.traces = collectData();
          state.bounds = computeBounds(state.traces);
          state.view = { ...state.bounds };
          state.hover = null;
          setMessage(`已绘制 ${state.traces.length} 条曲线`, "ok");
          updateStatus();
          renderSwatches();
          resizeCanvas();
        } catch (error) {
          setMessage(error.message, "error");
        }
      }

      function updateStatus() {
        if (!state.view) {
          els.status.textContent = "等待数据";
          return;
        }
        els.status.textContent = `X ${formatX(state.view.xmin)} 到 ${formatX(state.view.xmax)}，Y ${formatNumber(state.view.ymin)} 到 ${formatNumber(state.view.ymax)}`;
      }

      function renderSwatches() {
        const count = clamp(Number(els.seriesCount.value) || 1, 1, 12);
        els.swatches.innerHTML = "";
        for (let i = 0; i < count; i += 1) {
          const swatch = document.createElement("span");
          swatch.className = "swatch";
          swatch.style.background = colors[i % colors.length];
          els.swatches.appendChild(swatch);
        }
      }

      function resizeCanvas() {
        const rect = els.canvasWrap.getBoundingClientRect();
        state.dpr = window.devicePixelRatio || 1;
        els.canvas.width = Math.max(1, Math.floor(rect.width * state.dpr));
        els.canvas.height = Math.max(1, Math.floor(rect.height * state.dpr));
        els.canvas.style.width = `${rect.width}px`;
        els.canvas.style.height = `${rect.height}px`;
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        state.rect.width = rect.width;
        state.rect.height = rect.height;
        draw();
      }

      function plotRect() {
        return {
          x: state.rect.left,
          y: state.rect.top,
          w: Math.max(10, state.rect.width - state.rect.left - state.rect.right),
          h: Math.max(10, state.rect.height - state.rect.top - state.rect.bottom)
        };
      }

      function xToPx(x) {
        const r = plotRect();
        return r.x + ((x - state.view.xmin) / (state.view.xmax - state.view.xmin)) * r.w;
      }

      function yToPx(y) {
        const r = plotRect();
        return r.y + r.h - ((y - state.view.ymin) / (state.view.ymax - state.view.ymin)) * r.h;
      }

      function pxToX(px) {
        const r = plotRect();
        return state.view.xmin + ((px - r.x) / r.w) * (state.view.xmax - state.view.xmin);
      }

      function pxToY(py) {
        const r = plotRect();
        return state.view.ymax - ((py - r.y) / r.h) * (state.view.ymax - state.view.ymin);
      }

      function makeTicks(min, max, target = 8) {
        const span = max - min;
        if (!Number.isFinite(span) || span <= 0) return [];
        const step = Math.abs(niceNumber(span / target));
        const start = Math.ceil(min / step) * step;
        const ticks = [];
        for (let v = start; v <= max + step * 0.5; v += step) {
          ticks.push(Number(v.toPrecision(14)));
          if (ticks.length > 100) break;
        }
        return ticks;
      }

      function drawGridAndAxes() {
        const r = plotRect();
        ctx.clearRect(0, 0, state.rect.width, state.rect.height);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, state.rect.width, state.rect.height);

        if (!state.view) {
          ctx.fillStyle = "#667085";
          ctx.font = "14px Segoe UI, Microsoft YaHei, Arial";
          ctx.textAlign = "center";
          ctx.fillText("等待数据", state.rect.width / 2, state.rect.height / 2);
          return;
        }

        ctx.strokeStyle = "#edf0f4";
        ctx.lineWidth = 1;
        ctx.font = "12px Segoe UI, Microsoft YaHei, Arial";
        ctx.fillStyle = "#667085";
        ctx.textBaseline = "middle";

        const xTicks = makeTicks(state.view.xmin, state.view.xmax, 8);
        const yTicks = makeTicks(state.view.ymin, state.view.ymax, 7);

        xTicks.forEach((tick) => {
          const x = xToPx(tick);
          ctx.beginPath();
          ctx.moveTo(x, r.y);
          ctx.lineTo(x, r.y + r.h);
          ctx.stroke();
          ctx.fillStyle = "#667085";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillText(formatX(tick), x, r.y + r.h + 10);
        });

        yTicks.forEach((tick) => {
          const y = yToPx(tick);
          ctx.beginPath();
          ctx.moveTo(r.x, y);
          ctx.lineTo(r.x + r.w, y);
          ctx.stroke();
          ctx.fillStyle = "#667085";
          ctx.textAlign = "right";
          ctx.textBaseline = "middle";
          ctx.fillText(formatNumber(tick), r.x - 10, y);
        });

        ctx.strokeStyle = "#9aa4b2";
        ctx.lineWidth = 1;
        ctx.strokeRect(r.x, r.y, r.w, r.h);
      }

      function drawTraces() {
        if (!state.view || !state.traces.length) return;
        const r = plotRect();
        ctx.save();
        ctx.beginPath();
        ctx.rect(r.x, r.y, r.w, r.h);
        ctx.clip();

        state.traces.forEach((trace) => {
          ctx.strokeStyle = trace.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          trace.x.forEach((x, index) => {
            const px = xToPx(x);
            const py = yToPx(trace.y[index]);
            if (index === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          });
          ctx.stroke();

          if (trace.x.length <= 160) {
            ctx.fillStyle = trace.color;
            trace.x.forEach((x, index) => {
              const px = xToPx(x);
              const py = yToPx(trace.y[index]);
              if (px < r.x - 3 || px > r.x + r.w + 3 || py < r.y - 3 || py > r.y + r.h + 3) return;
              ctx.beginPath();
              ctx.arc(px, py, 2.4, 0, Math.PI * 2);
              ctx.fill();
            });
          }
        });
        ctx.restore();
      }

      function drawLegend() {
        if (!state.traces.length) return;
        const r = plotRect();
        const lineHeight = 20;
        const padding = 8;
        const maxWidth = 180;
        ctx.font = "12px Segoe UI, Microsoft YaHei, Arial";
        const width = Math.min(maxWidth, Math.max(92, ...state.traces.map((t) => ctx.measureText(t.name).width + 44)));
        const height = state.traces.length * lineHeight + padding * 2;
        const x = r.x + r.w - width - 10;
        const y = r.y + 10;

        ctx.save();
        ctx.fillStyle = "rgba(255, 255, 255, 0.88)";
        ctx.strokeStyle = "#d7dce3";
        ctx.lineWidth = 1;
        roundedRect(x, y, width, height, 6);
        ctx.fill();
        ctx.stroke();

        ctx.textBaseline = "middle";
        state.traces.forEach((trace, index) => {
          const yy = y + padding + index * lineHeight + lineHeight / 2;
          ctx.strokeStyle = trace.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x + 10, yy);
          ctx.lineTo(x + 30, yy);
          ctx.stroke();
          ctx.fillStyle = "#1f2933";
          ctx.textAlign = "left";
          ctx.fillText(trace.name, x + 38, yy, width - 46);
        });
        ctx.restore();
      }

      function roundedRect(x, y, w, h, radius) {
        const rr = Math.min(radius, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function drawHover() {
        if (!state.hover || !state.view) return;
        const { px, py, trace } = state.hover;
        const r = plotRect();

        ctx.save();
        ctx.strokeStyle = "rgba(31, 41, 51, 0.35)";
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(px, r.y);
        ctx.lineTo(px, r.y + r.h);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = trace.color;
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }

      function drawSelection() {
        if (!state.selection) return;
        const { x1, y1, x2, y2 } = state.selection;
        const x = Math.min(x1, x2);
        const y = Math.min(y1, y2);
        const w = Math.abs(x2 - x1);
        const h = Math.abs(y2 - y1);
        ctx.save();
        ctx.fillStyle = "rgba(36, 107, 254, 0.12)";
        ctx.strokeStyle = "#246bfe";
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 4]);
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x, y, w, h);
        ctx.restore();
      }

      function draw() {
        drawGridAndAxes();
        drawTraces();
        drawHover();
        drawSelection();
        drawLegend();
      }

      function resetView() {
        if (!state.bounds) return;
        state.view = { ...state.bounds };
        state.hover = null;
        state.selection = null;
        hideTooltip();
        updateStatus();
        draw();
      }

      function setMode(mode) {
        state.mode = mode;
        els.panBtn.classList.toggle("active", mode === "pan");
        els.zoomBoxBtn.classList.toggle("active", mode === "box");
        els.canvas.classList.toggle("pan-mode", mode === "pan");
        state.selection = null;
        draw();
      }

      function pointerPosition(event) {
        const rect = els.canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      }

      function insidePlot(pos) {
        const r = plotRect();
        return pos.x >= r.x && pos.x <= r.x + r.w && pos.y >= r.y && pos.y <= r.y + r.h;
      }

      function panTo(pos) {
        const dx = pos.x - state.dragStart.x;
        const dy = pos.y - state.dragStart.y;
        const r = plotRect();
        const xSpan = state.startView.xmax - state.startView.xmin;
        const ySpan = state.startView.ymax - state.startView.ymin;
        const xShift = -(dx / r.w) * xSpan;
        const yShift = (dy / r.h) * ySpan;
        state.view = {
          xmin: state.startView.xmin + xShift,
          xmax: state.startView.xmax + xShift,
          ymin: state.startView.ymin + yShift,
          ymax: state.startView.ymax + yShift
        };
        updateStatus();
      }

      function zoomAt(pos, factor) {
        if (!state.view || !insidePlot(pos)) return;
        const cx = pxToX(pos.x);
        const cy = pxToY(pos.y);
        const xmin = cx - (cx - state.view.xmin) * factor;
        const xmax = cx + (state.view.xmax - cx) * factor;
        const ymin = cy - (cy - state.view.ymin) * factor;
        const ymax = cy + (state.view.ymax - cy) * factor;
        state.view = { xmin, xmax, ymin, ymax };
        updateStatus();
        draw();
      }

      function nearestPoint(pos) {
        if (!state.view || !state.traces.length) return null;
        let best = null;
        let bestDist = Infinity;
        state.traces.forEach((trace) => {
          trace.x.forEach((x, index) => {
            const px = xToPx(x);
            const py = yToPx(trace.y[index]);
            const dist = Math.hypot(px - pos.x, py - pos.y);
            if (dist < bestDist) {
              bestDist = dist;
              best = { trace, index, px, py, x, y: trace.y[index] };
            }
          });
        });
        return bestDist <= 14 ? best : null;
      }

      function showTooltip(point) {
        if (!point) {
          hideTooltip();
          return;
        }
        els.tooltip.style.display = "block";
        els.tooltip.innerHTML = `<strong>${escapeHtml(point.trace.name)}</strong><br>X: ${formatX(point.x)}<br>Y: ${formatNumber(point.y)}`;
        const wrapRect = els.canvasWrap.getBoundingClientRect();
        const tipRect = els.tooltip.getBoundingClientRect();
        const x = clamp(point.px + 14, 8, wrapRect.width - tipRect.width - 8);
        const y = clamp(point.py - tipRect.height - 12, 8, wrapRect.height - tipRect.height - 8);
        els.tooltip.style.left = `${x}px`;
        els.tooltip.style.top = `${y}px`;
      }

      function hideTooltip() {
        els.tooltip.style.display = "none";
      }

      function escapeHtml(text) {
        return text.replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      function fillSample() {
        const x = [];
        const y1 = [];
        const y2 = [];
        for (let i = 0; i <= 80; i += 1) {
          const value = i / 8;
          x.push(value.toFixed(3));
          y1.push((Math.sin(value) * 2 + value * 0.18).toFixed(4));
          y2.push((Math.cos(value * 0.72) * 1.5 + value * 0.1).toFixed(4));
        }
        els.seriesCount.value = 2;
        syncYFields();
        els.xInput.value = x.join("\n");
        document.getElementById("yInput0").value = y1.join("\n");
        document.getElementById("yInput1").value = y2.join("\n");
        document.getElementById("yName0").value = "sin";
        document.getElementById("yName1").value = "cos";
        plotFromInputs();
      }

      function clearAll() {
        els.xInput.value = "";
        Array.from(els.yFields.querySelectorAll("textarea")).forEach((area) => {
          area.value = "";
        });
        state.traces = [];
        state.bounds = null;
        state.view = null;
        state.hover = null;
        state.selection = null;
        hideTooltip();
        updateStatus();
        setMessage("X 为空时使用数据序号");
        draw();
      }

      els.seriesCount.addEventListener("change", syncYFields);
      els.seriesCount.addEventListener("input", () => {
        const value = Number(els.seriesCount.value);
        if (Number.isFinite(value) && value >= 1 && value <= 12) syncYFields();
      });
      els.plotBtn.addEventListener("click", plotFromInputs);
      els.sampleBtn.addEventListener("click", fillSample);
      els.clearBtn.addEventListener("click", clearAll);
      els.resetBtn.addEventListener("click", resetView);
      els.panBtn.addEventListener("click", () => setMode("pan"));
      els.zoomBoxBtn.addEventListener("click", () => setMode("box"));

      els.canvas.addEventListener("mousedown", (event) => {
        if (!state.view) return;
        const pos = pointerPosition(event);
        if (!insidePlot(pos)) return;
        state.dragging = true;
        state.dragStart = pos;
        state.startView = { ...state.view };
        els.canvas.classList.add("dragging");
        hideTooltip();
        if (state.mode === "box") {
          state.selection = { x1: pos.x, y1: pos.y, x2: pos.x, y2: pos.y };
        }
      });

      window.addEventListener("mousemove", (event) => {
        const pos = pointerPosition(event);
        if (state.dragging) {
          if (state.mode === "pan") {
            panTo(pos);
          } else {
            const r = plotRect();
            state.selection = {
              x1: state.dragStart.x,
              y1: state.dragStart.y,
              x2: clamp(pos.x, r.x, r.x + r.w),
              y2: clamp(pos.y, r.y, r.y + r.h)
            };
          }
          draw();
          return;
        }

        if (!insidePlot(pos)) {
          state.hover = null;
          hideTooltip();
          draw();
          return;
        }

        state.hover = nearestPoint(pos);
        showTooltip(state.hover);
        draw();
      });

      window.addEventListener("mouseup", () => {
        if (!state.dragging) return;
        els.canvas.classList.remove("dragging");
        if (state.mode === "box" && state.selection) {
          const s = state.selection;
          if (Math.abs(s.x2 - s.x1) > 8 && Math.abs(s.y2 - s.y1) > 8) {
            const xmin = pxToX(Math.min(s.x1, s.x2));
            const xmax = pxToX(Math.max(s.x1, s.x2));
            const ymin = pxToY(Math.max(s.y1, s.y2));
            const ymax = pxToY(Math.min(s.y1, s.y2));
            state.view = { xmin, xmax, ymin, ymax };
            updateStatus();
          }
          state.selection = null;
        }
        state.dragging = false;
        draw();
      });

      els.canvas.addEventListener("wheel", (event) => {
        if (!state.view) return;
        event.preventDefault();
        const factor = event.deltaY < 0 ? 0.82 : 1.22;
        zoomAt(pointerPosition(event), factor);
      }, { passive: false });

      els.canvas.addEventListener("dblclick", resetView);

      window.addEventListener("resize", resizeCanvas);

      syncYFields();
      resizeCanvas();
      fillSample();
    })();
  </script>
</body>
</html>
