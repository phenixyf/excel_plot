<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Excel 数据曲线图</title>
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <main class="app">
    <section id="inputPanel" class="input-panel" aria-label="数据输入">
      <div class="panel-header">
        <h1 id="appTitle">Excel 数据曲线图</h1>
        <div class="header-tools">
          <div class="language-control">
            <label id="languageLabel" for="languageSelect">语言</label>
            <select id="languageSelect">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <div class="series-control">
            <label id="seriesCountLabel" for="seriesCount">Y 曲线数</label>
            <input id="seriesCount" type="number" min="1" max="12" value="2" />
          </div>
        </div>
      </div>

      <div id="metaInfo" class="meta-info">作者：一非，开发者：AI</div>

      <div class="mode-tabs" aria-label="输入方式">
        <button id="pasteModeBtn" class="active" type="button">粘贴输入</button>
        <button id="fileModeBtn" type="button">文件导入</button>
      </div>

      <div id="filePanel" class="file-panel">
        <div class="file-grid">
          <div class="file-control full">
            <label id="fileInputLabel" for="fileInput">上传 Excel 或 CSV 文件</label>
            <div class="file-picker">
              <button id="fileChooseBtn" type="button">选择文件</button>
              <span id="fileNameText" class="file-name">未选择文件</span>
              <input id="fileInput" class="file-input-native" type="file" accept=".csv,.txt,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv" />
            </div>
          </div>
          <div class="file-control">
            <label id="sheetSelectLabel" for="sheetSelect">工作表</label>
            <select id="sheetSelect"></select>
          </div>
          <div class="file-control">
            <span id="orientationLabel">数据方向</span>
            <div class="segmented">
              <button id="columnModeBtn" class="active" type="button">按列</button>
              <button id="rowModeBtn" type="button">按行</button>
            </div>
          </div>
          <label class="checkbox-line">
            <input id="headerCheck" type="checkbox" checked />
            <span id="headerCheckLabel">首行/首列为名称</span>
          </label>
          <button id="applyFileBtn" class="primary" type="button">应用到输入区</button>
          <div id="fileStatus" class="file-status full">未选择文件</div>
        </div>
      </div>

      <div class="field-list">
        <div class="field x-data">
          <div class="field-top">
            <label id="xInputLabel" for="xInput">X 数据</label>
          </div>
          <div id="xSourceRow" class="file-source-row">
            <span id="xSourceLabel">X 来源</span>
            <input id="xSource" type="text" list="xSourceOptions" />
            <datalist id="xSourceOptions"></datalist>
          </div>
          <textarea id="xInput" spellcheck="false"></textarea>
        </div>

        <div id="yFields"></div>
      </div>

      <div class="actions">
        <button id="plotBtn" class="primary wide">绘图</button>
        <button id="sampleBtn">示例</button>
        <button id="clearBtn">清空</button>
      </div>
    </section>

    <section id="plotPanel" class="plot-panel" aria-label="曲线图">
      <div class="plot-toolbar">
        <div class="tool-group">
          <button id="panBtn" class="mode active" type="button">平移</button>
          <button id="zoomBoxBtn" class="mode" type="button">框选</button>
          <button id="resetBtn" type="button">还原</button>
        </div>
        <div id="status" class="status">等待数据</div>
      </div>

      <div id="canvasWrap" class="canvas-wrap">
        <canvas id="plotCanvas" class="pan-mode"></canvas>
        <div id="tooltip" class="tooltip"></div>
        <input id="colorPicker" class="color-picker" type="color" aria-label="修改曲线颜色" />
        <div id="metricMenu" class="metric-menu" role="menu" aria-label="统计选项">
          <button type="button" data-metric="max" role="menuitem">最大值 (MAX)</button>
          <button type="button" data-metric="min" role="menuitem">最小值 (MIN)</button>
          <button type="button" data-metric="rms" role="menuitem">有效值 (RMS)</button>
        </div>
      </div>

      <div class="plot-footer">
        <div id="message" class="message">X 为空时使用数据序号</div>
        <div id="swatches" class="swatches"></div>
      </div>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
